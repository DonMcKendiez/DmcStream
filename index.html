<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>FiREWATCH Streaming Service</title>
</head>
<body>
    <header>
        <nav>
            <h1>FiREWATCH</h1>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#trending">Trending</a></li>
                <li><a href="#releases">Releases</a></li>
                <li><a href="#search">Search</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="hero">
            <h2>Interstellar</h2>
            <p>A group of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.</p>
        </section>
        <section id="trending">
            <h3>Trending Now</h3>
            <div class="carousel">
                <!-- Carousel content for trending movies -->
            </div>
        </section>
        <section id="releases">
            <h3>New Releases</h3>
            <div class="carousel">
                <!-- Carousel content for new releases -->
            </div>
        </section>
        <section id="search">
            <input type="text" placeholder="Search for movies...">
            <button>Search</button>
        </section>
    </main>
    <footer>
        <div class="social-links">
            <a href="#">Facebook</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
        </div>
    </footer>
</body>
</html>
